<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SpotLight Photo Studio</title>
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --accent-color: #ff66a1; --heading-color: #2d0a18; }
    body { font-family: 'Montserrat', sans-serif; background-color: #fff9fa; height: 100vh; overflow: hidden; }
    
    .login-container { height: 100vh; display: flex; }

    /* Sisi Kiri - Gambar */
    .login-sidebar {
      background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('assets/img/about/poto.webp') center/cover;
      width: 50%;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .login-sidebar h1 { font-size: 3.5rem; font-weight: 700; color: #2d0a18; margin-bottom: 10px; }
    .login-sidebar p { font-size: 1.1rem; color: #2d0a18; max-width: 400px; font-weight: 500; }

    .floating-info {
      position: absolute;
      bottom: 30px;
      left: 30px;
      background: rgba(255, 255, 255, 0.9);
      padding: 15px 25px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      color: #333;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .floating-info i { color: var(--accent-color); font-size: 1.5rem; }

    /* Sisi Kanan - Form */
    .login-form-side {
      width: 50%;
      background: #fff9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .form-box { width: 100%; max-width: 450px; }
    .form-box h2 { font-weight: 700; color: #1a1a1a; margin-bottom: 10px; }
    .form-box p.subtitle { color: #666; margin-bottom: 35px; font-size: 0.95rem; }

    .form-label { font-size: 0.85rem; font-weight: 600; color: #555; }
    
    .input-group { background: white; border: 1px solid #eee; border-radius: 10px; overflow: hidden; margin-bottom: 20px; transition: 0.3s; }
    .input-group:focus-within { border-color: var(--accent-color); }
    .input-group-text { background: none; border: none; color: #999; padding-left: 15px; }
    .form-control { border: none; padding: 12px 10px; font-size: 0.9rem; }
    .form-control:focus { box-shadow: none; }

    .btn-masuk {
      background: var(--accent-color);
      color: white;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      margin-top: 20px;
      transition: 0.3s;
    }
    .btn-masuk:hover { background: #ff4d94; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 102, 161, 0.3); }

    .separator { display: flex; align-items: center; text-align: center; color: #999; font-size: 0.8rem; margin: 30px 0; }
    .separator::before, .separator::after { content: ""; flex: 1; border-bottom: 1px solid #eee; }
    .separator::before { margin-right: 15px; }
    .separator::after { margin-left: 15px; }

    .social-btn {
      width: 48%;
      padding: 10px;
      border: 1px solid #eee;
      background: white;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: 0.3s;
    }
    .social-btn:hover { background: #f8f8f8; }
    .social-btn img { width: 20px; }

    @media (max-width: 992px) {
      .login-sidebar { display: none; }
      .login-form-side { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <!-- Kiri -->
    <div class="login-sidebar">
      
    </div>

    <!-- Kanan -->
    <div class="login-form-side">
      <div class="form-box">
        <h2>Selamat Datang Kembali</h2>
        <p class="subtitle">Silakan masuk untuk melanjutkan akses ke dasbor Anda.</p>

        <form>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" placeholder="nama@email.com">
            </div>
          </div>

          <div class="mb-1">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" placeholder="••••••••">
              <span class="input-group-text" style="cursor: pointer;"><i class="bi bi-eye"></i></span>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember">
              <label class="form-check-label" for="remember" style="font-size: 0.85rem; color: #666;">Ingat Saya</label>
            </div>
            <a href="#" style="color: var(--accent-color); font-size: 0.85rem; font-weight: 600; text-decoration: none;">Lupa Password?</a>
          </div>

          <button type="submit" class="btn-masuk">Masuk</button>
        </form>



<div class="separator">atau masuk dengan</div>

<div class="d-flex justify-content-center w-100">
  <button class="social-btn" type="button">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path>
      <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path>
      <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path>
      <path fill="#1976D2" d="M43.611,20.083L43.595,20L24,20v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path>
    </svg>
    Google
  </button>
</div>

        <p class="text-center mt-5" style="font-size: 0.9rem; color: #666;">
          Belum punya akun? <a href="register.html" style="color: var(--accent-color); font-weight: 700; text-decoration: none;">Daftar di sini</a>
        </p>
      </div>
    </div>
  </div>

</body>
</html>
