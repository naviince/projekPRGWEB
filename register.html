<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Daftar Akun - SpotLight Studio</title>

  <!-- Favicons -->
  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">

  <style>
    :root {
      --primary-color: #d82b6b;
      --secondary-color: #5cacee;
      --bg-gradient: linear-gradient(135deg, #fff5f7 0%, #e3f2fd 100%);
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .register-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 40px;
      box-shadow: 0 15px 35px rgba(216, 43, 107, 0.1);
      width: 100%;
      max-width: 500px;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .logo-wrapper {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo-wrapper img {
      width: 70px;
      transition: transform 0.3s ease;
    }

    .logo-wrapper img:hover {
      transform: scale(1.1) rotate(5deg);
    }

    .register-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .register-header h2 {
      font-weight: 800;
      color: #2d0a18;
      margin-bottom: 10px;
      font-size: 1.8rem;
    }

    .register-header p {
      color: #666;
      font-size: 0.9rem;
    }

    .form-label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #444;
      margin-left: 5px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group-text {
      background-color: transparent;
      border-right: none;
      color: var(--primary-color);
      border-radius: 12px 0 0 12px;
      padding-left: 15px;
    }

    .form-control {
      border-left: none;
      border-radius: 0 12px 12px 0;
      padding: 12px 15px;
      font-size: 0.95rem;
      border-color: #dee2e6;
    }

    .form-control:focus {
      border-color: #dee2e6;
      box-shadow: none;
      background-color: #fff9fa;
    }

    .btn-register {
      background: var(--primary-color);
      background: linear-gradient(45deg, #d82b6b, #e91e63);
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: white;
      width: 100%;
      margin-top: 10px;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(216, 43, 107, 0.3);
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(216, 43, 107, 0.4);
      color: white;
    }

    .login-footer {
      text-align: center;
      margin-top: 25px;
      font-size: 0.9rem;
      color: #666;
    }

    .login-footer a {
      color: var(--secondary-color);
      text-decoration: none;
      font-weight: 700;
    }

    /* Dekorasi Lingkaran Berwarna di Background */
    .circle-deco {
      position: absolute;
      z-index: -1;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.4;
    }

    .circle-1 {
      width: 300px;
      height: 300px;
      background: var(--primary-color);
      top: -50px;
      left: -50px;
    }

    .circle-2 {
      width: 250px;
      height: 250px;
      background: var(--secondary-color);
      bottom: -50px;
      right: -50px;
    }
  </style>
</head>

<body>

  <!-- Dekorasi Latar Belakang -->
  <div class="circle-deco circle-1"></div>
  <div class="circle-deco circle-2"></div>

  <div class="register-card" data-aos="zoom-in">
    <div class="logo-wrapper">
      <a href="index.html">
        <img src="assets/img/spotlight.png" alt="Logo Spotlight">
      </a>
    </div>

    <div class="register-header">
      <h2>Buat Akun Baru ✨</h2>
      <p>Bergabunglah dengan ribuan orang yang telah mengabadikan momen indahnya bersama SpotLight.</p>
    </div>

    <form action="index.html"> <!-- Ganti ke proses_daftar.php saat backend siap -->
      <div class="mb-3">
        <label class="form-label">Nama Lengkap</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" placeholder="Contoh: Budi Santoso" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Alamat Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" placeholder="name@example.com" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Kata Sandi</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" placeholder="Minimal 8 karakter" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Konfirmasi Kata Sandi</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
          <input type="password" class="form-control" placeholder="Ulangi kata sandi" required>
        </div>
      </div>

      <div class="form-check mb-4 text-start">
        <input class="form-check-input" type="checkbox" id="terms" required>
        <label class="form-check-label small color-666" for="terms">
          Saya setuju dengan <a href="#" style="color: var(--primary-color);">Syarat & Ketentuan</a>
        </label>
      </div>

      <button type="submit" class="btn btn-register">Daftar Sekarang</button>
    </form>

    <div class="login-footer">
      Sudah punya akun? <a href="login.html">Masuk di Sini</a>
    </div>
  </div>

  <!-- Vendor JS Files -->
  <script src="assets/vendor/aos/aos.js"></script>
  <script>
    AOS.init({
      duration: 1000,
      easing: 'ease-in-out',
      once: true,
      mirror: false
    });
  </script>

</body>

</html>
